name: alphaquest
description: A complete production-quality AI-powered handwritten alphabet recognition application.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.1
  dio: ^5.4.0
  camera: ^0.10.5
  image_picker: ^1.0.7
  google_fonts: ^6.1.0
  shared_preferences: ^2.2.2
  flutter_animate: ^4.5.0
  lottie: ^3.0.0
  image: ^4.1.3
  permission_handler: ^11.3.0
  connectivity_plus: ^5.0.2
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.1
  intl: ^0.19.0
  confetti: ^0.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
